# =============================================================================
# TAKT Global Configuration
# =============================================================================

# --- General ---
language: ja
log_level: info
default_piece: default-mini
verbose: false

# --- Provider / Model ---
provider: claude
model: sonnet

# All personas use Claude (Codex is used separately via codex-review skill)
# persona_providers:
#   coder:
#     provider: codex    # Enable when TAKT_OPENAI_API_KEY is set
#   planner:
#     provider: claude
#   supervisor:
#     provider: claude

# --- Execution ---
concurrency: 2
prevent_sleep: true
branch_name_strategy: ai
auto_fetch: true

# --- Worktree / PR ---
auto_pr: false
draft_pr: true

# --- Notifications ---
notification_sound: true
notification_sound_events:
  iteration_limit: true
  piece_complete: true
  piece_abort: true
  run_complete: true
  run_abort: true

# --- Provider Options ---
provider_options:
  claude:
    sandbox:
      allow_unsandboxed_commands: true
  codex:
    network_access: true

# --- Provider Profiles ---
provider_profiles:
  claude:
    default_permission_mode: edit
    movement_permission_overrides:
      ai_review: readonly

# --- Output ---
interactive_preview_movements: 3

# --- Analytics ---
analytics:
  enabled: true
  retention_days: 30
