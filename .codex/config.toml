# Codex CLI Configuration File

model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
hide_agent_reasoning = true
network_access = true
personality = "pragmatic"
model = "gpt-5.4"

# Project root detection and document auto-loading
project_root_markers = [".git", ".hg"]
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md"]

# Tools configuration
[tools]

# Notification settings (macOS)
notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff"]

# Multi-agent support (experimental)
[features]
multi_agent = true

[projects."/Users/takumiakasaka/Git-Project/github.com/eyday/proto"]
trust_level = "trusted"

[projects."/Users/takumiakasaka/Git-Project/github.com/takumi12311123/dotfiles"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

# MCP Servers
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

